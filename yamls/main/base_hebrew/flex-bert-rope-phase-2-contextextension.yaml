# Note that some of the fields in this template haven't been filled in yet.
# Please resolve any `null` fields before launching!

# Follow the instructions in the README to set up ./data/c4
# Or point data paths to your remote C4 dataset
run_group: base # checkpoint namespace shared across phases
data_local: ./data/hebrewmodernbert/hebrew # DEFERRED phase (context extension to 8192) — budget/schedule need review before use
data_remote: # If blank, files must be present in data_local

max_seq_len: 8192
tokenizer_name: tokenizer/v4_bpe_150k # BPE 150K beats DictaBERT: 1.302 tok/word 0% UNK
mlm_probability: 0.3 # FlexBERT should use 30% masking for optimal performance
count_padding_tokens: false

# Run Name
run_name: modern-bert-base-phase-2-contextextension

# Model
model:
  name: flex_bert # flex_bert, hf_bert, mosaic_bert
  recompute_metric_loss: false # recompute metric loss, use if passing label_smoothing to record non-label-smoothed loss as a metric
  pretrained_model_name: bert-base-uncased #${tokenizer_name}
  #pretrained_checkpoint: checkpoints/modern-bert-base-phase-0.1-pretrain/20250512_1506/ckpt/latest-rank0.pt # If set, will load from this checkpoint instead of training from scratch
  tokenizer_name: ${tokenizer_name}

  # FlexBERT 'base' generally uses the default architecture values from the Hugging Face BertConfig object
  # Note: if using the pretrained_checkpoint argument to create a model from an existing checkpoint, make sure
  # the model_config settings match the architecture of the existing model
  model_config:
    # architectures: ["ModernBertForMaskedLM"]
    # model_type: modernbert
    num_attention_heads: 12 # bert-base default
    num_hidden_layers: 22 # bert-base default
    hidden_size: 768
    intermediate_size: 1152
    layer_norm_eps: 1e-5
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.1
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: true
    final_norm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    max_position_embeddings: ${max_seq_len}
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: glu
    mlp_out_bias: false
    normalization: layernorm
    norm_kwargs:
      eps: 1e-5
      bias: false
    padding: unpadded
    sparse_prediction: false
    rotary_emb_dim: null # will be set to headdim by default
    rotary_emb_base_local: 10000.0
    rotary_emb_base: 160000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    allow_embedding_resizing: true
    hidden_act: gelu
    head_pred_act: gelu
    activation_function: gelu
    init_method: full_megatron
    init_std: 0.02
    init_cutoff_factor: 2.0
    init_small_embedding: False
    deterministic_fa2: false
    initial_attention_layer: null
    initial_bert_layer: null
    initial_mlp_layer: null
    num_initial_layers: 0
    skip_first_prenorm: true
    sliding_window: 128
    global_attn_every_n_layers: 3
    unpad_embeddings: true
    pad_logits: false
    compile_model: true
    masked_prediction: true
    vocab_size: 150016
    type_vocab_size: 1
    bos_token_id: 2
    cls_token_id: 2
    eos_token_id: 3
    pad_token_id: 0
    sep_token_id: 3

# Dataloaders
train_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: train
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
  drop_last: true
  num_workers: 8
  # sequence_packing: true

eval_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: validation
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: false
    mlm_probability: 0.15 # We always evaluate at 15% masking for consistent comparison
  drop_last: false
  num_workers: 8

# Optimization
scheduler:
  name: one_minus_sqrt
  alpha_f: 0.001
  t_decay: ${max_duration}
  t_max: ${max_duration}

optimizer:
  name: decoupled_stableadamw
  lr: 3e-4 # Peak learning rate
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5 # Amount of weight decay regularization
  filter_bias_norm_wd: true # If True, doesn't apply weight decay to norm layers and biases
  log_grad_norm: true

# algorithms:

max_duration: 50_000_000_000tok
eval_interval: 500ba
eval_subset_num_batches: 100 # cap in-training eval (validation split is ~34G); ~100k samples/eval keeps the loss curve fast

# System
seed: 17
global_train_batch_size: 576 # 8x reduction (keep tokens/batch constant vs 1024-context phases)
device_train_microbatch_size: 144 # B200 smoke-validated at 8192 (compile=true, fits per-GPU on 4 GPUs = 576/4)
# device_train_microbatch_size: auto
precision: amp_bf16

global_eval_batch_size: 64
device_eval_microbatch_size: 4

# Logging
progress_bar: true # was false
log_to_console: false # was true
console_log_interval: 10ba

algorithms:
  gradient_clipping:
    clipping_type: norm
    clipping_threshold: 1.0

callbacks:
  speed_monitor:
    window_size: 50
  lr_monitor: {}

# (Optional) W&B logging
loggers:
  wandb:
    project: HebModernBERT-phase2
    entity: asafam

# (Optional) Profiler
# profiler:
#   composer_trace_dir: profiler/${run_name}/${timestamp}/composer_profiler
#   torch_trace_dir:  profiler/${run_name}/${timestamp}/torch_profiler

# (Optional) Checkpoint to local filesystem or remote object store
checkpoint_dir: "checkpoints"
save_interval: 1000ba
save_num_checkpoints_to_keep: -1  # Important, this cleans up checkpoints saved to DISK
save_folder: ${checkpoint_dir}/${run_group}/${run_name}/ckpt    # checkpoints/base/<run_name>/ckpt

# (Optional) Load model from checkpopint
# init_from_checkpoint:
#   checkpoint_cfg: ${model}
#   checkpoint_load_path: ${checkpoint_dir}
#   checkpoint_run_name: "modern-bert-base-phase-0.1-pretrain/20250521_2334/ckpt"


# (Optional) Load from local filesystem or remote object store to
# start from an existing model checkpoint;
# e.g. './ckpt/latest-rank{rank}.pt' (local), or
# 's3://mybucket/mydir/ckpt/latest-rank{rank}.pt' (remote)
# load_path: null
# load_path: "/home/nlp/achimoa/workspace/ModernHebrewBERT/checkpoints/modern-bert-base-phase-0.1-pretrain/20250603_1331/ckpt/latest-rank0.pt"
load_path: ${checkpoint_dir}/${run_group}/modern-bert-base-phase-1-contextextension/ckpt/latest-rank0.pt
load_weights_only: true # context-ext: load previous-phase WEIGHTS only -> fresh optimizer/schedule/clock (else inherits ~100B-tok elapsed -> "max_duration <= elapsed" error). Matches phase-0.2.

spin_dataloaders: false # skip dataloader fast-forward on resume (NoStreamingDataset re-iterates 200M+ docs otherwise -> hang); data ordering doesn't matter for pretraining
autoresume: true # on requeue, resume from latest checkpoint in save_folder; first start loads load_path (previous phase)
# reset_time: true # restarts the scheduler, dataloaders, etc from step zero
# restart_override: true # resets optimizer hyperparameters (LR, WD, etc), LR Scheduler, and training microbatch size from the checkpoint's values

