# Phase 1: Context extension 1024 -> 8192. Loads phase-0.2 checkpoint.

run_group: large
data_local: ./data/hebrewmodernbert/hebrew
data_remote:

max_seq_len: 8192
tokenizer_name: tokenizer/v4_bpe_150k
mlm_probability: 0.3
count_padding_tokens: false

# Run Name
run_name: modern-bert-large-phase-1-contextextension

# Model
model:
  name: flex_bert
  recompute_metric_loss: false
  pretrained_model_name: bert-base-uncased
  tokenizer_name: ${tokenizer_name}
  disable_train_metrics: true

  model_config:
    num_attention_heads: 16
    num_hidden_layers: 28
    hidden_size: 1024
    intermediate_size: 2624
    layer_norm_eps: 1e-5
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.1
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: true
    final_norm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    max_position_embeddings: ${max_seq_len}
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: glu
    mlp_out_bias: false
    normalization: layernorm
    norm_kwargs:
      eps: 1e-5
      bias: false
    padding: unpadded
    sparse_prediction: false
    rotary_emb_dim: null
    rotary_emb_base_local: 10000.0
    rotary_emb_base: 160000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    local_attn_rotary_emb_base: 10000.0
    local_attn_rotary_emb_dim: null
    allow_embedding_resizing: true
    hidden_act: gelu
    head_pred_act: gelu
    activation_function: gelu
    init_method: full_megatron
    init_std: 0.02
    init_cutoff_factor: 2.0
    init_small_embedding: False
    deterministic_fa2: false
    initial_attention_layer: null
    initial_bert_layer: null
    initial_mlp_layer: null
    num_initial_layers: 0
    skip_first_prenorm: true
    sliding_window: 128
    global_attn_every_n_layers: 3
    unpad_embeddings: true
    pad_logits: false
    compile_model: true
    masked_prediction: true
    vocab_size: 150016
    type_vocab_size: 1
    bos_token_id: 2
    cls_token_id: 2
    eos_token_id: 3
    pad_token_id: 0
    sep_token_id: 3

# Dataloaders
train_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: train
    streaming: false
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
  drop_last: true
  num_workers: 4

eval_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: validation
    streaming: false
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: false
    mlm_probability: 0.15
  drop_last: false
  num_workers: 4

# Optimization
scheduler:
  name: constant_with_warmup
  t_warmup: 0tok # paper uses no LR warmup at context-extension start (ModernBERT arXiv:2412.13663)
  t_max: ${max_duration}

optimizer:
  name: decoupled_stableadamw
  lr: 3.0e-4
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5
  filter_bias_norm_wd: true
  log_grad_norm: true

max_duration: 30_000_000_000tok # 30B tokens; ~576*8192=4.7M tok/batch -> ~6400 steps
eval_interval: 500ba
eval_subset_num_batches: 100

# System
seed: 17
global_train_batch_size: 576 # 8x reduction (keep tokens/batch constant vs 1024-context phases)
device_train_microbatch_size: 2 # placeholder — large model at 8192 seq_len; tune after smoke
precision: amp_bf16

global_eval_batch_size: 32
device_eval_microbatch_size: 2

# Logging
progress_bar: true
log_to_console: false
console_log_interval: 10ba

algorithms:
  gradient_clipping:
    clipping_type: norm
    clipping_threshold: 1.0

callbacks:
  speed_monitor:
    window_size: 50
  lr_monitor: {}

loggers:
  wandb:
    project: HebModernBERT-large-phase1
    entity: asafam
    init_kwargs:
      resume: allow
      id: hebrewmodernbert-large-phase-1

checkpoint_dir: "checkpoints"
save_interval: 500ba # ~6400 total steps; save frequently
save_num_checkpoints_to_keep: -1
save_folder: ${checkpoint_dir}/${run_group}/${run_name}/ckpt

load_path: ${checkpoint_dir}/${run_group}/modern-bert-large-phase-0.2-pretrain/ckpt/latest-rank0.pt

spin_dataloaders: false # skip dataloader fast-forward on resume (NoStreamingDataset would re-iterate 200M+ docs -> hang)
autoresume: true
