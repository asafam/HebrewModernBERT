# Phase 0.2: Hebrew specialization — continued pretraining on Hebrew-only data.
# Loads phase-0.1 WEIGHTS only (fresh schedule/step); WSD schedule so the final
# model is growable (resume the pre-anneal checkpoint to extend the run).

run_group: large # checkpoint namespace shared across phases (checkpoints/large/<run>/ckpt)
data_local: ./data/hebrewmodernbert/hebrew # phase 0.2: SPECIALIZE on Hebrew-only
data_remote: # If blank, files must be present in data_local

max_seq_len: 1024
tokenizer_name: tokenizer/v4_bpe_150k # BPE 150K beats DictaBERT: 1.302 tok/word, 0% UNK
mlm_probability: 0.3
count_padding_tokens: false # count only REAL tokens toward max_duration

# Run Name
run_name: modern-bert-large-phase-0.2-pretrain

# Model
model:
  name: flex_bert
  recompute_metric_loss: false
  pretrained_model_name: bert-base-uncased
  tokenizer_name: ${tokenizer_name}

  model_config:
    num_attention_heads: 16
    num_hidden_layers: 28
    hidden_size: 1024
    intermediate_size: 2624
    layer_norm_eps: 1e-5
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.1
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: true
    final_norm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    max_position_embeddings: ${max_seq_len}
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: glu
    mlp_out_bias: false
    normalization: layernorm
    norm_kwargs:
      eps: 1e-5
      bias: false
    padding: unpadded
    sparse_prediction: false
    rotary_emb_dim: null
    rotary_emb_base_local: 10000.0
    rotary_emb_base: 160000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    allow_embedding_resizing: true
    hidden_act: gelu
    head_pred_act: gelu
    activation_function: gelu
    init_method: full_megatron
    init_std: 0.02
    init_cutoff_factor: 2.0
    init_small_embedding: False
    deterministic_fa2: false
    initial_attention_layer: null
    initial_bert_layer: null
    initial_mlp_layer: null
    num_initial_layers: 0
    skip_first_prenorm: true
    sliding_window: 128
    global_attn_every_n_layers: 3
    unpad_embeddings: true
    pad_logits: false
    compile_model: true
    masked_prediction: true
    vocab_size: 150016
    type_vocab_size: 1
    bos_token_id: 2
    cls_token_id: 2
    eos_token_id: 3
    pad_token_id: 0
    sep_token_id: 3

# Dataloaders
train_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: train
    streaming: false # NoStreamingDataset: local MDS is uncompressed; avoids multi-GPU hang
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
  drop_last: true
  num_workers: 8
  # batch_size_warmup removed: loading from stable pretrained weights; WSD LR warmup handles adaptation

eval_loader:
  name: text
  dataset:
    local: ${data_local}
    remote: ${data_remote}
    split: validation
    streaming: false
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: false
    mlm_probability: 0.15
  drop_last: false
  num_workers: 8

# Optimization
scheduler:
  name: warmup_stable_decay # WSD: brief re-warm -> stable -> anneal. Growable.
  t_warmup: 0.02dur
  t_decay: 0.1dur
  alpha_f: 0.02

optimizer:
  name: decoupled_stableadamw
  lr: 5.0e-4 # Peak LR for large (slightly lower than base's 8e-4)
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5
  filter_bias_norm_wd: true
  log_grad_norm: true

max_duration: 100_000_000_000tok # 100B REAL tokens (~0.5 epoch of the ~193B Hebrew corpus)
eval_interval: 10000ba
eval_subset_num_batches: 100

# System
seed: 17
global_train_batch_size: 4608
device_train_microbatch_size: 128 # tune after smoke test (large model is ~2.2x base)
precision: amp_bf16

global_eval_batch_size: 1024
device_eval_microbatch_size: 64

# Logging
progress_bar: true
log_to_console: false
console_log_interval: 10ba

algorithms:
  gradient_clipping:
    clipping_type: norm
    clipping_threshold: 1.0

callbacks:
  speed_monitor:
    window_size: 50
  lr_monitor: {}

loggers:
  wandb:
    project: HebModernBERT-large-phase0.2
    entity: asafam
    init_kwargs:
      resume: allow
      id: hebrewmodernbert-large-phase-0.2

checkpoint_dir: "checkpoints"
save_interval: 4000ba
save_num_checkpoints_to_keep: -1
save_folder: ${checkpoint_dir}/${run_group}/${run_name}/ckpt

load_path: ${checkpoint_dir}/${run_group}/modern-bert-large-phase-0.1-pretrain/ckpt/latest-rank0.pt
load_weights_only: true # fresh schedule/step from phase-0.1 weights

spin_dataloaders: false # skip dataloader fast-forward on resume (NoStreamingDataset would re-iterate 200M+ docs -> hang)
autoresume: true # on requeue, resume from latest checkpoint in save_folder
